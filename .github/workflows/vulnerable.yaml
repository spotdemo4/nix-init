name: vulnerable

on:
  schedule:
    - cron: "0 9 * * 0" # every Sunday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  flake:
    runs-on: ubuntu-latest
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@7a1fc2b6c1ffc5ff962956ed19d624b4a9c38445 # v1.33.0
        with:
          shell: vulnerable

      - name: Check flake
        run: flake-checker -f

  actions:
    runs-on: ubuntu-latest
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@7a1fc2b6c1ffc5ff962956ed19d624b4a9c38445 # v1.33.0
        with:
          shell: vulnerable

      - name: Run octoscan
        run: octoscan scan .github
